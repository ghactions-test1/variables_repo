name: Deployment with Manual Approval

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        run: |
          echo "Building application..."
          echo "Build artifact: app-${{ github.sha }}"

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deployed to staging"

  test-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests on staging
        run: |
          echo "Running smoke tests..."
          echo "All tests passed"

  approve-production:
    needs: test-staging
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - name: Await approval
        run: echo "Production deployment approved"

  deploy-production:
    needs: approve-production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Deploy to production
        run: echo "Deployed to production"

  post-deploy:
    needs: [build, deploy-staging, test-staging, approve-production, deploy-production]
    runs-on: ubuntu-latest
    steps:
      - name: Verify production
        run: echo "Production smoke tests passed"
      - name: Write pipeline summary
        run: |
          {
            echo "## Pipeline Summary"
            echo ""
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| Deploy staging | ${{ needs.deploy-staging.result }} |"
            echo "| Test staging | ${{ needs.test-staging.result }} |"
            echo "| Approve production | ${{ needs.approve-production.result }} |"
            echo "| Deploy production | ${{ needs.deploy-production.result }} |"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo "Triggered by: @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"