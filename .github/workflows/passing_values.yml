# This is a basic workflow to help you get started with Actions
name: passing job values

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # --- 1. Pass value between steps in the SAME job (via GITHUB_ENV) ---
  pass_in_one_job:
    runs-on: ubuntu-latest
    steps:
      - name: Set color
        id: color-selector
        run: echo "COLOR=blue" >> $GITHUB_ENV
      - name: Get color
        run: echo "The selected color is $COLOR"

  # --- 2. Pass value between DIFFERENT jobs (via job outputs) ---
  producer:
    runs-on: ubuntu-latest
    outputs:
      message: ${{ steps.sentence_maker.outputs.message }}
    steps:
      - name: Make a sentence
        id: sentence_maker
        run: |
          echo "message=Hello from the producer job" >> $GITHUB_OUTPUT

  consumer:
    runs-on: ubuntu-latest
    needs: producer
    steps:
      - name: Print the message
        env:
          message: ${{ needs.producer.outputs.message }}
        run: |
          echo $message

  # --- 3. Pass a FILE between jobs on different OSes (via artifacts) ---
  job_1:
    name: Add 3 and 7
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          expr 3 + 7 > result.txt
      - uses: actions/upload-artifact@v4
        with:
          name: homework
          path: result.txt

  job_2:
    name: Multiply by 9
    needs: job_1
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: homework
      - shell: bash
        run: |
          value=`cat result.txt`
          echo $(expr $value \* 9)
