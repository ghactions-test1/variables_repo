name: dispatch
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        type: choice
        default: warning
        options:
          - info
          - warning
          - debug
      environment:
        description: 'Environment to run against'
        type: environment
        required: true
      matrix:
        description: 'Matrix strategy as JSON'
        type: string
        required: true

jobs:
  log-the-inputs:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Print inputs and matrix combination
        run: |
          echo "Log level: $LEVEL"
          echo "Environment: $ENVIRONMENT"
          echo "Running with version=${{ matrix.version }} on os=${{ matrix.os }}"
        env:
          LEVEL: ${{ inputs.logLevel }}
          ENVIRONMENT: ${{ inputs.environment }}
